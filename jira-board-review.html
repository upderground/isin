<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea.KF — Ready for Review</title>
  <style>
    :root {
      --ds-background-neutral: #091e420f;
      --ds-background-neutral-hovered: #091e4224;
      --ds-border: #091e4221;
      --ds-text: #172b4d;
      --ds-text-subtle: #44546f;
      --ds-background-brand-bold: #0c66e4;
      --jira-color-menuBackgroundColour: #f1f2f4;
      --jira-color-textHeadingColour: #172b4d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      font-size: 14px;
      color: var(--ds-text);
    }
    body { margin: 0; background: var(--jira-color-menuBackgroundColour); min-height: 100vh; }
    .board-header {
      background: #0747a6; color: #deebff; padding: 12px 24px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 2px rgba(9,30,66,.25);
    }
    .board-header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .board-container { padding: 24px; overflow-x: auto; }
    .board { display: flex; gap: 16px; min-height: 400px; align-items: flex-start; }
    .column {
      flex: 0 0 280px; background: var(--ds-background-neutral);
      border-radius: 8px; min-height: 120px;
      display: flex; flex-direction: column; border: 1px solid var(--ds-border);
    }
    .column-header {
      padding: 12px 16px; font-weight: 600;
      color: var(--jira-color-textHeadingColour);
      border-bottom: 1px solid var(--ds-border);
      border-radius: 8px 8px 0 0; background: #fff;
    }
    .column-body { padding: 8px; flex: 1; min-height: 80px; }
    .card {
      background: #fff; border-radius: 6px; padding: 12px; margin-bottom: 8px;
      box-shadow: 0 1px 2px rgba(9,30,66,.25); border: 1px solid var(--ds-border);
    }
    .card-key { font-size: 11px; color: var(--ds-text-subtle); margin-bottom: 4px; }
    .card-summary { font-weight: 500; color: var(--ds-text); }

    .flag-container {
      position: fixed; top: 80px; right: 24px; z-index: 500;
    }
    .flag {
      background: #fff; border-radius: 8px; padding: 16px 20px;
      box-shadow: 0 4px 16px rgba(9,30,66,.25); border-left: 4px solid #36b37e;
      max-width: 360px; animation: flagIn .3s ease-out;
    }
    .flag-title { font-weight: 600; margin-bottom: 4px; }
    .flag-body { color: var(--ds-text-subtle); font-size: 13px; }
    @keyframes flagIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <header class="board-header">
    <h1>Idea.KF</h1>
  </header>

  <div class="flag-container">
    <div class="flag">
      <div class="flag-title">MB-123 перемещена в Ready for Review</div>
      <div class="flag-body">Тестовая идея 1</div>
    </div>
  </div>

  <main class="board-container">
    <div class="board">
      <div class="column">
        <div class="column-header">In Progress</div>
        <div class="column-body"></div>
      </div>
      <div class="column">
        <div class="column-header">Ready for Review</div>
        <div class="column-body">
          <div class="card">
            <div class="card-key">MB-123</div>
            <div class="card-summary">Тестовая идея 1</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
