<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Геометрия 8 класс - карточки без перегруза</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5f677a;
      --line: #d8deec;
      --primary: #2a64ff;
      --primary-soft: #e9efff;
      --ok: #1f8f52;
      --warn: #9a6a18;
      --shadow: 0 14px 40px rgba(25, 40, 75, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8faff 0%, #eef2fb 100%);
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .topbar-inner {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .course-title {
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .pill {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      background: #dce4f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #3f74ff, #5f9bff);
      transition: width 0.25s ease;
    }

    main {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px 110px;
      flex: 1;
    }

    .explain {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 12px;
      background: #f9fbff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
      min-height: 58vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-kicker {
      display: inline-flex;
      align-self: flex-start;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: #2747a1;
      font-size: 12px;
      font-weight: 700;
    }

    .card h1 {
      margin: 0;
      font-size: clamp(22px, 4.4vw, 30px);
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .card p {
      margin: 0;
      line-height: 1.55;
      font-size: 17px;
    }

    .subtle {
      color: var(--muted);
      font-size: 15px;
    }

    .formula {
      margin: 2px 0;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f3f6ff;
      border: 1px solid #d8e2ff;
      font-weight: 700;
      line-height: 1.45;
      font-size: 16px;
    }

    .tip {
      border-left: 4px solid #6e95ff;
      background: #f8faff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.45;
    }

    .ok {
      color: var(--ok);
      font-weight: 700;
      font-size: 14px;
    }

    .figure {
      background: #f8faff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
    }

    .figure figcaption {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .card-divider {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 6px 0 2px;
    }

    .quiz {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
      background: #fcfdff;
    }

    .quiz-question {
      font-weight: 600;
      line-height: 1.4;
      font-size: 15px;
    }

    .quiz label {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.4;
      font-size: 15px;
      cursor: pointer;
    }

    .quiz button {
      justify-self: start;
      margin-top: 4px;
    }

    .feedback {
      min-height: 22px;
      font-size: 14px;
      line-height: 1.45;
    }

    .feedback.good {
      color: var(--ok);
      font-weight: 600;
    }

    .feedback.soft {
      color: #765422;
    }

    .controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      border-top: 1px solid var(--line);
      background: rgba(250, 252, 255, 0.97);
      backdrop-filter: blur(8px);
      padding: 12px;
    }

    .controls-inner {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 1px solid #2a64ff;
      background: #2a64ff;
      color: #fff;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #234ec9;
      border-color: #b7caf9;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .center-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .module-track {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .module-chip {
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff;
      color: #55607a;
    }

    .module-chip.done {
      border-color: #8bcda8;
      color: #1f8f52;
      background: #f1fbf5;
    }

    dialog {
      border: none;
      border-radius: 16px;
      width: min(620px, calc(100vw - 24px));
      padding: 0;
      box-shadow: 0 24px 70px rgba(18, 34, 72, 0.35);
    }

    dialog::backdrop {
      background: rgba(15, 23, 44, 0.35);
    }

    .modal {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .modal h2 {
      margin: 0;
      font-size: 20px;
    }

    .topic-btn {
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .topic-btn.done {
      background: #f2fbf5;
      border-color: #9ad8b2;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      .card {
        min-height: 63vh;
      }
      .card p {
        font-size: 16px;
      }
      .controls-inner {
        grid-template-columns: auto auto;
      }
      .center-note {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title-row">
        <div class="course-title">Геометрия перед демо-тестом</div>
        <button id="open-map" class="secondary" type="button">Карта тем</button>
      </div>
      <div class="meta">
        <span class="pill" id="step-meta">Шаг 1 из 1</span>
        <span class="pill" id="stars-meta">Звезды: 0/9</span>
      </div>
      <div class="bar" aria-hidden="true"><span id="progress-fill"></span></div>
    </div>
  </header>

  <main>
    <p class="explain">
      Прогресс хранится в этом устройстве, пока не очистили данные сайта. Если открыли файл с флешки или из почты, иногда сбрасывается, это нормально.<br>
      9 звезд - за девять тем. Старт и чек-лист без звезды.
    </p>
    <article class="card" id="card"></article>
  </main>

  <section class="controls">
    <div class="controls-inner">
      <button id="prev-btn" class="secondary" type="button">Назад</button>
      <div class="center-note" id="module-note">Тема</div>
      <button id="next-btn" type="button">Дальше</button>
    </div>
  </section>

  <dialog id="map-dialog">
    <div class="modal">
      <h2>Карта курса</h2>
      <div id="map-list"></div>
      <button id="close-map" class="secondary" type="button">Закрыть</button>
    </div>
  </dialog>

  <script>
    (function () {
      const STORAGE_KEY = "geo8.cards.v1";

      const MODULES = [
        { id: "start", title: "Старт", star: false },
        { id: "pif", title: "Пифагор", star: true },
        { id: "trig", title: "Синус, косинус, тангенс", star: true },
        { id: "para", title: "Параллелограмм", star: true },
        { id: "mid", title: "Средняя линия", star: true },
        { id: "circle", title: "Окружность", star: true },
        { id: "rhomb", title: "Ромб и квадрат", star: true },
        { id: "trap", title: "Трапеция", star: true },
        { id: "theory", title: "Теория да/нет", star: true },
        { id: "final", title: "Финальные 4 вопроса", star: true },
        { id: "check", title: "Чек-лист перед тестом", star: false }
      ];

      const CARDS = [
        {
          module: "start",
          kicker: "Старт",
          title: "Сейчас не зубрим, а понимаем",
          body: [
            "Этот учебник устроен как тренировка: сначала простая идея, потом короткий пример, потом проверка.",
            "Так тебе не нужно держать в голове сразу всю геометрию. Мы двигаемся маленькими шагами и закрепляем каждый шаг."
          ],
          tip: "Цель курса: понять логику задач из демо-теста и научиться решать их уверенно."
        },
        {
          module: "start",
          kicker: "Старт",
          title: "Как читать дробь обычными словами",
          body: [
            "Если видишь запись с чертой, это просто деление: верхнюю часть делим на нижнюю.",

        {

        {
          module: "start",
          kicker: "Старт",
          title: "Как не путаться в действиях",

          formula: "(a + b) : 2 x h -> сначала (a + b), потом делим на 2, потом умножаем на h",
          tip: "Пример: (6 + 10) : 2 x 4 = 16 : 2 x 4 = 8 x 4 = 32."

        {

          ],
          figure: `

              <svg viewBox="0 0 260 150" width="100%" role="img" aria-label="Прямоугольный треугольник">

                <text x="14" y="74" font-size="13" fill="#1f2430">C</text>

        },
        {
          module: "pif",
          kicker: "Тема 1",
          title: "Теорема Пифагора: как применять в задаче",

          formula: "Проверка: a<sup>2</sup> + b<sup>2</sup> ?= c<sup>2</sup><br>Если равны, тогда можно использовать теорему Пифагора.",

        {

        {

          formula: "Пример: катеты 6 и 8 -> гипотенуза сразу 10"

        {

            "7) Для параллелограмма беру основание и высоту к нему, а не случайные числа.",
            "8) Если ошиблась в ответе, разбираю ход решения и пробую еще раз."
          ],
          tip: "Курс завершен. Можно пройти нужную тему еще раз через карту тем."
        }
      ];

      const firstCardByModule = {};
      CARDS.forEach((card, idx) => {
        if (typeof firstCardByModule[card.module] === "undefined") {
          firstCardByModule[card.module] = idx;
        }
      });

      function buildPages(cards) {
        const pages = [];
        let index = 0;
        while (index < cards.length) {
          const moduleId = cards[index].module;
          const indices = [];
          while (index < cards.length && cards[index].module === moduleId && indices.length < 3) {
            const current = cards[index];
            indices.push(index);
            index += 1;

            // Quiz/completion cards should feel like a natural finish of a block.
            if (current.quiz || current.completeModule) break;

            if (
              indices.length === 1 &&
              index < cards.length &&
              cards[index].module === moduleId &&
              (cards[index].quiz || cards[index].completeModule)
            ) {
              indices.push(index);
              index += 1;
              break;
            }
          }
          pages.push({ module: moduleId, indices });
        }
        return pages;
      }

      const PAGES = buildPages(CARDS);
      const cardIndexToPageIndex = {};
      PAGES.forEach((page, pageIdx) => {
        page.indices.forEach((cardIdx) => {
          cardIndexToPageIndex[cardIdx] = pageIdx;
        });
      });

      const defaultState = {
        index: 0,
        moduleDone: {},
        answers: {}
      };

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { ...defaultState };
          const parsed = JSON.parse(raw);
          return {
            index: Number.isInteger(parsed.index) ? Math.min(Math.max(parsed.index, 0), PAGES.length - 1) : 0,
            moduleDone: parsed.moduleDone || {},
            answers: parsed.answers || {}
          };
        } catch (err) {
          return { ...defaultState };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function countStars() {
        return MODULES.filter((m) => m.star && state.moduleDone[m.id]).length;
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderQuiz(quiz) {
        const selected = state.answers[quiz.id];
        const optionsHtml = quiz.options.map((option) => {
          const checked = selected && selected.value === option.value ? "checked" : "";
          return `
            <label>
              <input type="radio" name="${quiz.id}" value="${escapeHtml(option.value)}" ${checked}>
              <span>${escapeHtml(option.label)}</span>
            </label>
          `;
        }).join("");

        let feedbackHtml = "";
        if (selected && selected.message) {
          const cls = selected.ok ? "feedback good" : "feedback soft";
          feedbackHtml = `<p class="${cls}">${selected.message}</p>`;
        } else {
          feedbackHtml = `<p class="feedback"></p>`;
        }

        return `
          <div class="quiz" data-quiz="${quiz.id}">
            <div class="quiz-question">${escapeHtml(quiz.question)}</div>
            ${optionsHtml}
            <button class="secondary" type="button" data-check="${quiz.id}">Проверить</button>
            ${feedbackHtml}
          </div>
        `;
      }

      function maybeCompleteModule(card) {
        if (card.completeModule && !state.moduleDone[card.completeModule]) {
          state.moduleDone[card.completeModule] = true;
          saveState();
        }
      }

      function renderModuleTrack() {
        return `
          <div class="module-track">
            ${MODULES.map((module) => {
              const done = state.moduleDone[module.id];
              return `<span class="module-chip ${done ? "done" : ""}">${done ? "✓ " : ""}${module.title}</span>`;
            }).join("")}
          </div>
        `;
      }

      function renderCard() {
        const page = PAGES[state.index];
        const cardsOnPage = page.indices.map((cardIdx) => CARDS[cardIdx]);
        const cardEl = document.getElementById("card");
        const parts = [];
        cardsOnPage.forEach((card, idx) => {
          maybeCompleteModule(card);
          if (idx > 0) parts.push(`<hr class="card-divider">`);
          parts.push(`<h1>${escapeHtml(card.title)}</h1>`);
          if (card.body) {
            card.body.forEach((paragraph) => parts.push(`<p>${escapeHtml(paragraph)}</p>`));
          }
          if (card.formula) {
            parts.push(`<div class="formula">${card.formula}</div>`);
          }
          if (card.tipHtml) {
            parts.push(`<div class="tip">${card.tipHtml}</div>`);
          } else if (card.tip) {
            parts.push(`<div class="tip">${escapeHtml(card.tip)}</div>`);
          }
          if (card.figure) {
            parts.push(card.figure);
          }
          if (card.quiz) {
            parts.push(renderQuiz(card.quiz));
          }
        });
        parts.push(renderModuleTrack());
        cardEl.innerHTML = parts.join("");

        const stars = countStars();
        const step = state.index + 1;
        document.getElementById("step-meta").textContent = `Шаг ${step} из ${PAGES.length}`;
        document.getElementById("stars-meta").textContent = `Звезды: ${stars}/9`;
        document.getElementById("progress-fill").style.width = `${(step / PAGES.length) * 100}%`;
        document.getElementById("module-note").textContent = MODULES.find((m) => m.id === page.module).title;

        document.getElementById("prev-btn").disabled = state.index === 0;
        document.getElementById("next-btn").disabled = state.index === PAGES.length - 1;

        bindQuizHandlers(cardsOnPage.filter((card) => card.quiz).map((card) => card.quiz));
        renderMap();
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      }

      function bindQuizHandlers(quizzes) {
        if (!quizzes || quizzes.length === 0) return;
        quizzes.forEach((quiz) => {
          const root = document.querySelector(`[data-quiz="${quiz.id}"]`);
          if (!root) return;

          root.querySelectorAll(`input[name="${quiz.id}"]`).forEach((input) => {
            input.addEventListener("change", () => {
              const picked = quiz.options.find((o) => o.value === input.value);
              if (!picked) return;
              state.answers[quiz.id] = state.answers[quiz.id] || {};
              state.answers[quiz.id].value = picked.value;
              saveState();
            });
          });

          const checkBtn = root.querySelector(`[data-check="${quiz.id}"]`);
          checkBtn.addEventListener("click", () => {
            const selected = state.answers[quiz.id];
            const out = root.querySelector(".feedback");
            if (!selected || !selected.value) {
              out.className = "feedback soft";
              out.textContent = "Выбери вариант и нажми проверку еще раз. Ошибка - это нормальный шаг в учебе.";
              return;
            }
            const option = quiz.options.find((o) => o.value === selected.value);
            if (!option) return;
            const message = option.ok ? option.good : option.soft;
            state.answers[quiz.id] = { value: option.value, ok: !!option.ok, message };
            saveState();
            out.className = option.ok ? "feedback good" : "feedback soft";
            out.textContent = message;
          });
        });
      }

      function renderMap() {
        const mapList = document.getElementById("map-list");
        mapList.innerHTML = MODULES.map((module) => {
          const startCardIndex = firstCardByModule[module.id];
          const start = cardIndexToPageIndex[startCardIndex] || 0;
          const done = !!state.moduleDone[module.id];
          const hasStar = module.star ? (done ? "⭐" : "☆") : "•";
          return `
            <button type="button" class="topic-btn ${done ? "done" : ""}" data-jump="${start}">
              <span>${escapeHtml(module.title)}</span>
              <span class="mini">${hasStar}</span>
            </button>
          `;
        }).join("");

        mapList.querySelectorAll("[data-jump]").forEach((button) => {
          button.addEventListener("click", () => {
            const target = Number(button.getAttribute("data-jump"));
            if (!Number.isInteger(target)) return;
            state.index = target;
            saveState();
            renderCard();
            scrollToTop();
            document.getElementById("map-dialog").close();
          });
        });
      }

      const state = loadState();
      renderCard();

      document.getElementById("prev-btn").addEventListener("click", () => {
        if (state.index > 0) {
          state.index -= 1;
          saveState();
          renderCard();
          scrollToTop();
        }
      });

      document.getElementById("next-btn").addEventListener("click", () => {
        if (state.index < PAGES.length - 1) {
          state.index += 1;
          saveState();
          renderCard();
          scrollToTop();
        }
      });

      const mapDialog = document.getElementById("map-dialog");
      document.getElementById("open-map").addEventListener("click", () => mapDialog.showModal());
      document.getElementById("close-map").addEventListener("click", () => mapDialog.close());
    })();
  </script>
</body>
</html>
